<h2>Add Employee Record</h2>
<form method="post">
  {% csrf_token %}
  <label>Name:</label><input type="text" name="employee_name"><br>
  <label>Department:</label><input type="text" name="department"><br>
  <label>Bank Account:</label><input type="text" name="bank_account_number"><br>
  <label>Annual Salary:</label><input type="number" step="0.01" name="annual_salary"><br>
  <button type="submit">Save</button>
</form>
